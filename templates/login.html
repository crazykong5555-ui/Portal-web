<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>WEBAPP PORTAL</title>

<style>

body{
background:magenta;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:black;
padding:40px;
width:350px;
border-radius:10px;
text-align:center;
}

h1{
color:white;
margin-bottom:10px;
}

h2{
color:magenta;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;

background:black;
color:white;

border:2px solid magenta;
}

button{

width:100%;
padding:12px;

background:magenta;
color:white;

border:none;
cursor:pointer;

}

button:hover{
background:#ff00cc;
}

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h1>WEBAPP PORTAL</h1>
<h2>Login</h2>

<form method="POST">

<input type="text" name="user" placeholder="User" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Ingresar</button>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</form>

</div>

</body>
</html>
