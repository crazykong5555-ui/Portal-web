<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBAPP PORTAL</title>

<!-- FUENTE OPEN SOURCE -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg, #ff0080, #0066ff);
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* TARJETA LOGIN */
.card{
    background: black;
    padding: 40px;
    width: 350px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

h1{
    color: white;
    margin-bottom: 10px;
    font-size: 28px;
}

h2{
    color: magenta;
    margin-bottom: 25px;
    font-size: 22px;
}

input{
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    background: black;
    color: white;
    border: 2px solid magenta;
    border-radius: 6px;
    box-sizing: border-box;
    font-size: 16px;
}

input:focus{
    outline: none;
    border-color: #ff66cc;
    box-shadow: 0 0 8px magenta;
}

button{
    width: 100%;
    padding: 12px;
    background: magenta;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
}

button:hover{
    background: #ff00cc;
}

.error{
    color: red;
    margin-top: 10px;
}

/* FOOTPRINT */
.footprint {
    position: fixed;
    bottom: 15px;
    width: 100%;
    text-align: right;
    font-family: 'Great Vibes', cursive;
    font-size: 24px;
    color: white;
    letter-spacing: 1px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<div class="card">

    <h1>WEBAPP PORTAL</h1>
    <h2>Login</h2>

    <form method="POST">

        <input type="text" name="user" placeholder="User" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Ingresar</button>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

    </form>

</div>

<!-- FOOTPRINT -->
<footer class="footprint">La Fábrica Del Software</footer>

</body>
</html>
